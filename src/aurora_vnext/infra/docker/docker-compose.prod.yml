# Aurora OSI vNext — Production Docker Compose
# Phase Q §Q.5 — Deployment Hardening
#
# Services:
#   api      — FastAPI application (uvicorn, 4 workers)
#   worker   — Background scan pipeline worker
#   db       — PostgreSQL 15 (production: replace with RDS)
#   redis    — Token revocation + rate limiting (production: replace with ElastiCache)
#
# CONSTITUTIONAL RULE: No scientific constants or scoring parameters are
# defined in this file. All aurora_score_version, aurora_physics_model_version,
# etc. are set via environment variables sourced from .env.prod or AWS SSM.
# This file is infrastructure only.

version: "3.9"

services:

  # ─── API ──────────────────────────────────────────────────────────────────
  api:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.api
    image: aurora-api:${AURORA_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env.prod
    environment:
      AURORA_ENV: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "scripts/healthcheck.py"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ─── Worker ───────────────────────────────────────────────────────────────
  worker:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.worker
    image: aurora-worker:${AURORA_VERSION:-latest}
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      AURORA_ENV: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ─── Database ─────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       aurora_vnext
      POSTGRES_USER:     aurora
      POSTGRES_PASSWORD: ${AURORA_DB_PASS:?AURORA_DB_PASS required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../infra/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aurora -d aurora_vnext"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${AURORA_REDIS_PASS:?AURORA_REDIS_PASS required} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${AURORA_REDIS_PASS}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

volumes:
  postgres_data:
  redis_data: