version: 0.2
phases:
  pre_build:
    commands:
      - echo "Logging in to ECR..."
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin us-east-1.dkr.ecr.amazonaws.com
  build:
    commands:
      - echo "Building Aurora image..."
      - docker build -t aurora-api:latest .
      - docker tag aurora-api:latest us-east-1.dkr.ecr.amazonaws.com/aurora-api:latest
  post_build:
    commands:
      - echo "Pushing to ECR..."
      - docker push us-east-1.dkr.ecr.amazonaws.com/aurora-api:latest
